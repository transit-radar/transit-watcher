receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
exporters:
  debug:
    verbosity: detailed
  otlp_grpc:
    endpoint: http://jaeger:4317
    tls:
      insecure: true
service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug, otlp_grpc]
    metrics:
      receivers: [otlp]
      exporters: [debug, otlp_grpc]
    logs:
      receivers: [otlp]
      exporters: [debug]
