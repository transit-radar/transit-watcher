name: Code Quality
on:
  pull_request:
jobs:
  unit-test:
    runs-on: codeberg-small
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # V7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
      - name: Test
        run: go test -v ./...
